  document.getElementById('ph').innerHTML=`
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:5px">
      <h1 class="pt2" style="margin-bottom:0">${b.title}</h1>
      <div class="view-toggle">
        <button class="vt-btn ${viewMode==='single'?'active':''}" onclick="setView('single')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
          Uno a uno
        </button>
        <button class="vt-btn ${viewMode==='list'?'active':''}" onclick="setView('list')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Lista
        </button>
      </div>
    </div>
    <p class="pd">${b.desc}</p>`;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function rEx(){
  if(viewMode==='list') return rExList();
  const exs=bExs();
  if(!exs.length){document.getElementById('ea').innerHTML='<p style="color:var(--ink3)">Sin ejercicios.</p>';return;}
  curI=Math.min(curI,exs.length-1);
  const ex=exs[curI];const key=ek(ex);const done=!!answered[key];

  let h=`<div class="ex-card"><div class="ex-meta-row"><div class="ex-meta">${ex.meta}</div>${statusBadge(key,done,ex)}</div><div class="ex-prompt">${ex.prompt}</div>`;
  if(ex.quote) h+=`<div class="ex-quote">${ex.quote.replace(/\n/g,'<br>')}</div>`;

  if(ex.type==='open')        h+=bOpen(key,ex,done);
  else if(ex.type==='mcq'||ex.type==='vocab-mcq') h+=bMCQ(key,ex,done);
  else if(ex.type==='sent-mcq') h+=bSentMCQ(key,ex,done);
  else if(ex.type==='fill'||ex.type==='paronyms') h+=bFill(key,ex,done);
  else if(ex.type==='join')   h+=bJoin(key,ex,done);

  h+=`</div><div class="nr">
    <button class="btn bg2" onclick="nav(-1)" ${curI===0?'disabled':''}>← Anterior</button>
    <span class="ni">${curI+1} / ${exs.length}</span>
    <button class="btn bg2" onclick="nav(1)" ${curI===exs.length-1?'disabled':''}>Siguiente →</button>
  </div>`;

  document.getElementById('ea').innerHTML=h;
  updStats();

  if(done&&(ex.type==='open'||ex.type==='join')&&!ex._fb){
    const el=document.getElementById('fb-'+key);
    if(el) getFB(key,ex,ex._ans,el);
  }
}

function statusBadge(key,done,ex){
  if(!done) return '<span class="lv-status pending">Pendiente</span>';
  // For MCQ/sent-mcq we know if correct
  if(ex.type==='mcq'||ex.type==='vocab-mcq'||ex.type==='sent-mcq'){
    const wasCorrect=ex._chosenIdx!==undefined?ex.options[ex._chosenIdx].correct
      : ex.options.some((o,i)=>o.correct&&fillSel[key+'-0']===undefined);
    // Simplify: just show done
    return '<span class="lv-status done-ok">✓ Hecho</span>';
  }
  if(ex.type==='fill'||ex.type==='paronyms'){
    const all=ex.items.every((_,i)=>fillSel[`${key}-${i}`]);
    if(all){
      const r=ex.items.filter((it,i)=>fillSel[`${key}-${i}`]===it.answer).length;
      return r===ex.items.length
        ? '<span class="lv-status done-ok">✓ Perfecto</span>'
        : `<span class="lv-status done-no">${r}/${ex.items.length} correctos</span>`;
    }
  }
  return '<span class="lv-status done-ok">✓ Enviado</span>';
}

function rExList(){
  const exs=bExs();
  if(!exs.length){document.getElementById('ea').innerHTML='<p style="color:var(--ink3)">Sin ejercicios.</p>';return;}
  const ea=document.getElementById('ea');
  ea.classList.add('list-view');

  let h='';
  exs.forEach((ex,i)=>{
    const key=ek(ex);
    const done=!!answered[key];
    const expanded=ex._listExpanded||false;
    const collapsedCls=expanded?'':'lv-collapsed';

    h+=`<div class="ex-card ${collapsedCls}" id="lvc-${key}">
      <div class="ex-meta-row">
        <div class="ex-meta">${ex.meta}</div>
        ${statusBadge(key,done,ex)}
      </div>
      <div class="ex-prompt">${ex.prompt}</div>`;

    if(ex.quote) h+=`<div class="ex-quote">${ex.quote.replace(/\n/g,'<br>')}</div>`;

    // Full exercise content
    if(ex.type==='open')        h+=bOpen(key,ex,done);
    else if(ex.type==='mcq'||ex.type==='vocab-mcq') h+=bMCQ(key,ex,done);
    else if(ex.type==='sent-mcq') h+=bSentMCQ(key,ex,done);
    else if(ex.type==='fill'||ex.type==='paronyms') h+=bFill(key,ex,done);
    else if(ex.type==='join')   h+=bJoin(key,ex,done);

    // Expand button (visible only when collapsed via CSS)
    h+=`<button class="lv-expand-btn" onclick="lvExpand(${key})">
      Ver ejercicio
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>`;

    h+=`</div>`;
  });

  ea.innerHTML=h;
  updStats();

  // Trigger pending AI feedback for expanded done exercises
  exs.forEach(ex=>{
    const key=ek(ex);
    const done=!!answered[key];
    if(done&&(ex.type==='open'||ex.type==='join')&&!ex._fb&&ex._listExpanded){
      const el=document.getElementById('fb-'+key);
      if(el) getFB(key,ex,ex._ans,el);
    }
  });
}

function lvExpand(key){
  EX[key]._listExpanded=true;
  const card=document.getElementById('lvc-'+key);
  if(card){
    card.classList.remove('lv-collapsed');
    // Trigger AI feedback if needed
    const ex=EX[key];
    const done=!!answered[key];
    if(done&&(ex.type==='open'||ex.type==='join')&&!ex._fb){
      const el=document.getElementById('fb-'+key);
      if(el) getFB(key,ex,ex._ans,el);
    }
    card.scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function setView(mode){
  // Save any open textarea before switching
  const exs=bExs();
  const ex=exs[curI];
  if(ex){
    const key=ek(ex);
    const ta=document.getElementById('ans-'+key);
    if(ta&&!answered[key]) ex._ans=ta.value;
    const ji=document.getElementById('join-'+key);
    if(ji&&!answered[key]) ex._ans=ji.value;
  }
  viewMode=mode;
  // Toggle list-view class on ea
  const ea=document.getElementById('ea');
  if(mode==='single') ea.classList.remove('list-view');
  rHdr();  // re-render header to update toggle button state
  rEx();saveProgress();
}

// ── OPEN (expresión escrita / corrección) ─────────────────────────────────
function bOpen(key,ex,done){
  let h=`<textarea id="ans-${key}" placeholder="${ex.placeholder||''}" ${done?'readonly':''}>${ex._ans||''}</textarea>
  <div class="btn-row">
    <button class="btn bp" onclick="subOpen(${key})" ${done?'disabled':''}>Enviar →</button>
    ${done?`<button class="btn bg2" onclick="resetEx(${key})">Reintentar</button>`:''}
  </div>`;

  // Solución modelo (solo en expresión escrita, block 0)
  if(ex.block===0){
    if(ex.modelSolution){
      h+=`<div class="modelo-box">
        <div class="modelo-head" onclick="toggleModelo(this)">
          <span>Solución modelo</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="modelo-body">${ex.modelSolution}</div>
      </div>`;
    } else {
      h+=`<div class="modelo-box">
        <div class="modelo-head" style="cursor:default">
          <span>Solución modelo</span>
          <span style="font-size:10px;opacity:.6;font-style:italic;text-transform:none">Próximamente</span>
        </div>
        <div class="modelo-pending">El profesor añadirá la solución modelo próximamente.</div>
      </div>`;
    }
  }

  // AI feedback
  if(done){
    h+=`<div class="fb"><div class="fbh"><span class="fbd ${ex._fb?'':'loading'}"></span>Corrección IA</div>
    <div class="fbb ${ex._fb?'':'loading'}" id="fb-${key}">${ex._fb||'Analizando tu respuesta...'}</div></div>`;
  }
  return h;
}

// ── MCQ estándar ──────────────────────────────────────────────────────────
function bMCQ(key,ex,done){
  let h=`<div class="ol">`;
  ex.options.forEach((o,i)=>{
    const c=done?(o.correct?' correct':' wrong'):'';
    h+=`<button class="ob${c}" onclick="pickMCQ(${key},${i})" ${done?'disabled':''}>
      <span class="ltr">${String.fromCharCode(65+i)}</span><span>${o.text}</span></button>`;
  });
  h+=`</div>`;
  if(done) h+=`<div class="expl"><strong>Explicación</strong>${ex.explanation}</div>`;
  return h;
}

// ── SENT-MCQ (oraciones como opciones) ───────────────────────────────────
function bSentMCQ(key,ex,done){
  let h=`<div class="ol">`;
  ex.options.forEach((o,i)=>{
    let cls='';
    if(done) cls=o.correct?' correct':' wrong';
    h+=`<button class="sent-opt${cls}" onclick="pickSentMCQ(${key},${i})" ${done?'disabled':''}>
      <span class="ltr">${String.fromCharCode(65+i)}</span>
      <span>${o.text}</span>
    </button>`;
  });
  h+=`</div>`;
  if(done){
    // mostramos la explicación de la opción correcta + la que eligió si era incorrecta
    const chosen=ex._chosenIdx!==undefined?ex._chosenIdx:-1;
    h+=`<div class="expl"><strong>Explicación</strong>${ex.explanation}`;
    if(chosen>=0 && !ex.options[chosen].correct){
      h+=`<br><br><em>Por qué tu respuesta es incorrecta:</em> ${ex.options[chosen].expl}`;
    }
    h+=`</div>`;
  }
  return h;
}

// ── FILL / PARONYMS ───────────────────────────────────────────────────────
function bFill(key,ex,done){
  let h='';
  ex.items.forEach((it,i)=>{
    const ch=fillSel[`${key}-${i}`];const show=done||ch;
    h+=`<div class="fi"><div class="fs2">${it.sentence}</div><div class="fo">`;
    it.options.forEach(o=>{
      let c='';if(show){c=o===it.answer?' correct':(o===ch&&o!==it.answer?' wrong':'');}
      h+=`<button class="fo-btn${c}" onclick="pickF(${key},${i},'${o}')" ${show?'disabled':''}>${o}</button>`;
    });
    h+=`</div></div>`;
  });
  const all=ex.items.every((_,i)=>fillSel[`${key}-${i}`]);
  if(!done) h+=`<div class="btn-row"><button class="btn bp" onclick="subFill(${key})" ${all?'':'disabled'}>Comprobar</button></div>`;
  else{
    const r=ex.items.filter((it,i)=>fillSel[`${key}-${i}`]===it.answer).length;
    h+=`<div class="expl"><strong>${r}/${ex.items.length} correctos</strong>Verde = correcto · Rojo = incorrecto</div>`;
  }
  return h;
}

// ── JOIN ──────────────────────────────────────────────────────────────────
function bJoin(key,ex,done){
  let h=`<div class="ji"><div class="jp">${ex.parts.map((p,i)=>`<strong>${i===0?'A':'B'}.</strong> ${p}`).join('<br>')}</div>
  <input class="jinput" id="join-${key}" type="text" placeholder="${ex.placeholder||''}" value="${ex._ans||''}" ${done?'readonly':''}></div>
  <div class="btn-row">
    <button class="btn bp" onclick="subJoin(${key})" ${done?'disabled':''}>Enviar →</button>
    ${done?`<button class="btn bg2" onclick="resetEx(${key})">Reintentar</button>`:''}
  </div>`;
  if(done){
    h+=`<div class="fb"><div class="fbh"><span class="fbd ${ex._fb?'':'loading'}"></span>Corrección IA</div>
    <div class="fbb ${ex._fb?'':'loading'}" id="fb-${key}">${ex._fb||'Analizando tu oración...'}</div></div>`;
  }
  return h;
}

// ══════════════════════════════════════════
// TOGGLE MODELO
// ══════════════════════════════════════════
function toggleModelo(head){
  head.classList.toggle('open');
  const body=head.nextElementSibling;
  body.classList.toggle('show');
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function pickMCQ(key,idx){
  if(answered[key]) return;
  answered[key]=true;EX[key]._listExpanded=true;
  if(EX[key].options[idx].correct) correctCount++;
  rEx();updStats();saveProgress();
}
function pickSentMCQ(key,idx){
  if(answered[key]) return;
  EX[key]._chosenIdx=idx;
  answered[key]=true;EX[key]._listExpanded=true;
  if(EX[key].options[idx].correct) correctCount++;
  rEx();updStats();saveProgress();
}
function pickF(key,ii,val){fillSel[`${key}-${ii}`]=val;EX[key]._listExpanded=true;rEx();}
function subFill(key){
  const ex=EX[key];
  const r=ex.items.filter((it,i)=>fillSel[`${key}-${i}`]===it.answer).length;
  answered[key]=true;EX[key]._listExpanded=true;if(r===ex.items.length) correctCount++;
  rEx();updStats();saveProgress();
}
function subOpen(key){
  const ta=document.getElementById('ans-'+key);
  const v=ta?.value?.trim()||'';
  if(v.length<10){ta.style.borderColor='#F87171';setTimeout(()=>ta.style.borderColor='',1200);return;}
  EX[key]._ans=v;EX[key]._listExpanded=true;answered[key]=true;rEx();updStats();saveProgress();
}
function subJoin(key){
  const inp=document.getElementById('join-'+key);
  const v=inp?.value?.trim()||'';
  if(v.length<5){inp.style.borderColor='#F87171';setTimeout(()=>inp.style.borderColor='',1200);return;}
  EX[key]._ans=v;EX[key]._listExpanded=true;answered[key]=true;rEx();updStats();saveProgress();
}
function resetEx(key){
  delete answered[key];EX[key]._fb=null;EX[key]._ans=null;EX[key]._chosenIdx=undefined;EX[key]._listExpanded=true;
  rEx();
}
function nav(dir){
  const exs=bExs();const ex=exs[curI];
  if(ex){
    const key=ek(ex);
    const ta=document.getElementById('ans-'+key);if(ta&&!answered[key]) ex._ans=ta.value;
    const ji=document.getElementById('join-'+key);if(ji&&!answered[key]) ex._ans=ji.value;
  }
  curI+=dir;rEx();window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════
// AI FEEDBACK
// ══════════════════════════════════════════
async function getFB(key,ex,answer,el){
  try{
    const sys=`Eres un profesor experto en PAU de Lengua Castellana para 2º de Bachillerato en España. Evalúa con rigor y pedagogía. Devuelve HTML simple (span, br, b). Estructura: 1) Valoración general en una frase. 2) Aciertos con <span style="color:#2D6A4F">✓</span>. 3) Errores con <span style="color:#991B1B">✗</span> y corrección. 4) Consejo breve. Sin markdown. Rúbrica interna: ${ex.rubric}`;
    const msg=`Ejercicio: ${ex.prompt}\n${ex.quote?'Texto: '+ex.quote:''}\n${ex.parts?'Partes: '+ex.parts.join(' / '):''}\nRespuesta del alumno:\n${answer}`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,
        system:sys,messages:[{role:'user',content:msg}]})});
    const data=await r.json();
    const text=data.content?.map(c=>c.text||'').join('')||'No se pudo obtener corrección.';
    EX[key]._fb=text;
    el.classList.remove('loading');el.innerHTML=text;
    const dot=el.closest('.fb')?.querySelector('.fbd');if(dot) dot.classList.remove('loading');
  }catch(e){el.innerHTML='Error de conexión. Inténtalo de nuevo.';}
}

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════
function updStats(){
  const total=EX.length,done=Object.keys(answered).length,pct=Math.round(done/total*100);
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-ok').textContent=correctCount;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-bar').style.width=pct+'%';
  BLOCKS.forEach((_,b)=>{
    const bx=EX.filter(e=>e.block===b);
    const bd=bx.filter(e=>answered[ek(e)]).length;
    const el=document.getElementById('cnt-'+b);
    if(el){el.textContent=`${bd}/${bx.length}`;el.classList.toggle('show',bd>0);}
  });
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

loadProgress();buildNav();rHdr();rEx();
</script>
