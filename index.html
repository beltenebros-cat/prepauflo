<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrePAU Lengua · 2º Bachillerato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F4EF;--surface:#FFF;--surface2:#F0EDE6;
  --ink:#1A1714;--ink2:#6B6560;--ink3:#9E9890;
  --accent:#2D6A4F;--al:#D8EDDF;--ad:#1B4332;
  --danger:#991B1B;--dl:#FEE2E2;
  --border:rgba(26,23,20,.1);--border2:rgba(26,23,20,.18);
  --r:12px;--rs:8px;
}


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:268px;min-width:268px;background:var(--ink);color:#fff;display:flex;flex-direction:column;padding:1.5rem 1.25rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:2px}
.logo span{color:#74C69D}
.sub{font-size:10.5px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.25rem;font-weight:300}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.1rem}
.stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--rs);padding:8px 10px}
.stat .num{font-size:20px;font-weight:500;color:#74C69D;display:block}
.stat .lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em}
.pw{margin-bottom:1.1rem}
.pl{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.35);margin-bottom:4px}
.pt{background:rgba(255,255,255,.1);border-radius:99px;height:3px;overflow:hidden}
.pf{height:100%;background:#74C69D;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.nav-label{font-size:9.5px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;padding:0 4px;margin:7px 0 2px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 9px;border-radius:var(--rs);border:none;background:transparent;color:rgba(255,255,255,.52);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:1px}
.nb:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nb.active{background:rgba(116,198,157,.18);color:#74C69D;font-weight:500}
.nb .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.nb.active .dot{background:#74C69D}
.nb .cnt{margin-left:auto;background:#74C69D;color:var(--ad);border-radius:99px;font-size:9.5px;font-weight:600;padding:1px 5px;display:none}
.nb .cnt.show{display:inline}
.nav-sep{font-size:9px;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.12em;padding:10px 4px 2px;margin-top:4px;border-top:1px solid rgba(255,255,255,.07)}
.nav-sep:first-child{border-top:none;margin-top:0;padding-top:0}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:var(--rs);padding:3px}
.vt-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;font-size:12.5px;font-family:'DM Sans',sans-serif;color:var(--ink2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.vt-btn.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:500}
.vt-btn svg{flex-shrink:0}

/* ── LIST VIEW ── */
.list-view .ex-card{margin-bottom:.6rem;padding:1.1rem 1.4rem}
.list-view .ex-card.lv-collapsed .ex-prompt{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:0}
.list-view .ex-card.lv-collapsed .ex-quote,.list-view .ex-card.lv-collapsed .ol,.list-view .ex-card.lv-collapsed .sent-opt,.list-view .ex-card.lv-collapsed textarea,.list-view .ex-card.lv-collapsed .btn-row,.list-view .ex-card.lv-collapsed .fb,.list-view .ex-card.lv-collapsed .modelo-box,.list-view .ex-card.lv-collapsed .expl,.list-view .ex-card.lv-collapsed .fi,.list-view .ex-card.lv-collapsed .ji,.list-view .ex-card.lv-collapsed .jinput,.list-view .ex-card.lv-collapsed .fo{display:none}
.list-view .ex-card .lv-expand-btn{display:none}
.list-view .ex-card.lv-collapsed .lv-expand-btn{display:inline-flex;align-items:center;gap:4px;margin-top:.5rem;font-size:12px;color:var(--accent);border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0}
.list-view .ex-card .lv-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;margin-left:auto}
.lv-status.done-ok{background:var(--al);color:var(--ad)}
.lv-status.done-no{background:#FEE2E2;color:#991B1B}
.lv-status.pending{background:var(--surface2);color:var(--ink3)}
.ex-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ex-meta-row .ex-meta{margin-bottom:0}
.sf{margin-top:auto;padding-top:.85rem;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:rgba(255,255,255,.2)}

/* ── MAIN ── */
.main{flex:1;padding:2.5rem 3rem;max-width:780px}
.ph{margin-bottom:1.75rem;animation:fu .35s ease both}
.ey{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:500;margin-bottom:4px}
.pt2{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.15;margin-bottom:5px}
.pd{font-size:14px;color:var(--ink2);font-weight:300}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.65rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.06);animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ex-meta{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ex-meta::before{content:'';display:inline-block;width:16px;height:2px;background:var(--accent);border-radius:99px}
.ex-prompt{font-size:15px;line-height:1.65;margin-bottom:1rem}
.ex-quote{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--rs) var(--rs) 0;padding:.8rem 1rem;font-size:13.5px;color:var(--ink2);margin-bottom:1rem;line-height:1.7;font-style:italic;white-space:pre-line}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:7px;margin-top:.75rem;align-items:center;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--accent);color:#fff}.bp:hover:not(:disabled){background:var(--ad)}.bp:disabled{opacity:.4;cursor:not-allowed}
.bg2{background:transparent;color:var(--ink2);border:1px solid var(--border2)}.bg2:hover{background:var(--surface2);color:var(--ink)}.bg2:disabled{opacity:.35;cursor:not-allowed}

/* ── TEXTAREA (expresión escrita) ── */
textarea{width:100%;min-height:120px;resize:vertical;border:1.5px solid var(--border2);border-radius:var(--rs);padding:.75rem .85rem;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--bg);line-height:1.65;transition:border-color .15s;outline:none}
textarea:focus{border-color:var(--accent);background:#fff}
textarea[readonly]{opacity:.75;cursor:default}
textarea::placeholder{color:var(--ink3)}

/* ── MODELO SOLUCIÓN (expresión escrita) ── */
.modelo-box{margin-top:.9rem;border:1px solid #A7D7BB;border-radius:var(--rs);overflow:hidden}
.modelo-head{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;background:#EFF8F3;border-bottom:1px solid #A7D7BB;font-size:10.5px;font-weight:500;color:var(--ad);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none}
.modelo-head svg{transition:transform .2s}
.modelo-head.open svg{transform:rotate(180deg)}
.modelo-body{display:none;padding:.9rem 1.05rem;font-size:13.5px;line-height:1.75;background:#fff;color:var(--ink);white-space:pre-line}
.modelo-body.show{display:block}
.modelo-pending{padding:.9rem 1.05rem;font-size:13px;color:var(--ink3);font-style:italic;background:#fff}

/* ── AI FEEDBACK (expresión escrita) ── */
.fb{margin-top:.85rem;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.fbh{display:flex;align-items:center;gap:6px;padding:7px 13px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10.5px;font-weight:500;color:var(--ink2);text-transform:uppercase;letter-spacing:.07em}
.fbd{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.fbd.loading{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.fbb{padding:.9rem 1.05rem;font-size:13.5px;line-height:1.75;background:#fff}
.fbb.loading{color:var(--ink3);font-style:italic}

/* ── MCQ (tipo test) ── */
.ol{display:flex;flex-direction:column;gap:7px;margin-bottom:.8rem}
.ob{text-align:left;padding:10px 13px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg);font-size:14px;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;line-height:1.5;transition:all .15s;display:flex;gap:9px;align-items:flex-start}
.ob .ltr{font-weight:600;font-size:11.5px;min-width:19px;height:19px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;color:var(--ink2);transition:all .15s}
.ob:hover:not(:disabled){border-color:var(--accent);background:var(--al)}.ob:hover:not(:disabled) .ltr{background:var(--accent);color:#fff}
.ob.correct{background:var(--al);border-color:var(--accent);color:var(--ad)}.ob.correct .ltr{background:var(--accent);color:#fff}
.ob.wrong{background:var(--dl);border-color:#F87171;color:var(--danger)}.ob.wrong .ltr{background:#F87171;color:#fff}
.ob:disabled{cursor:default}
.expl{background:#EFF8F3;border:1px solid #A7D7BB;border-radius:var(--rs);padding:.8rem 1rem;font-size:13px;color:var(--ad);line-height:1.7;margin-top:.45rem}
.expl strong{display:block;font-weight:500;margin-bottom:2px;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;opacity:.7}

/* ── SENTENCE MCQ (reflexión: cada oración es opción) ── */
.sent-opt{text-align:left;padding:11px 14px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg);font-size:13.5px;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;line-height:1.6;transition:all .15s;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;font-style:italic}
.sent-opt .ltr{font-style:normal;font-weight:600;font-size:11.5px;min-width:19px;height:19px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0;color:var(--ink2);transition:all .15s}
.sent-opt:hover:not(:disabled){border-color:var(--accent);background:var(--al)}.sent-opt:hover:not(:disabled) .ltr{background:var(--accent);color:#fff}
.sent-opt.correct{background:var(--al);border-color:var(--accent);color:var(--ad)}.sent-opt.correct .ltr{background:var(--accent);color:#fff}
.sent-opt.wrong{background:var(--dl);border-color:#F87171;color:var(--danger)}.sent-opt.wrong .ltr{background:#F87171;color:#fff}
.sent-opt:disabled{cursor:default}

/* ── FILL ── */
.fi{background:var(--surface2);border-radius:var(--rs);padding:.75rem .9rem;margin-bottom:7px}
.fs2{font-size:14px;margin-bottom:8px;line-height:1.6}
.fo{display:flex;gap:6px;flex-wrap:wrap}
.fo-btn{padding:4px 12px;border-radius:99px;border:1.5px solid var(--border2);background:var(--surface);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--ink);transition:all .15s}
.fo-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--al)}
.fo-btn.correct{background:var(--al);border-color:var(--accent);color:var(--ad);font-weight:500}
.fo-btn.wrong{background:var(--dl);border-color:#F87171;color:var(--danger)}
.fo-btn:disabled{cursor:default}

/* ── JOIN ── */
.ji{background:var(--surface2);border-radius:var(--rs);padding:.75rem .9rem;margin-bottom:8px}
.jp{font-size:13.5px;color:var(--ink2);margin-bottom:7px;line-height:1.6}
.jinput{width:100%;border:1.5px solid var(--border2);border-radius:var(--rs);padding:.45rem .75rem;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s}
.jinput:focus{border-color:var(--accent)}

/* ── NAV ── */
.nr{display:flex;justify-content:space-between;align-items:center;margin-top:1.1rem}
.ni{font-size:12px;color:var(--ink3)}

/* ── HAMBURGER ── */
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--ink);border:none;border-radius:7px;width:37px;height:37px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.hamburger span{display:block;width:15px;height:1.5px;background:#fff;border-radius:99px}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
@media(max-width:820px){
  .hamburger{display:flex}.layout{flex-direction:column}
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .3s ease}
  .sidebar.open{transform:translateX(0)}.ovl.open{display:block}
  .main{padding:1.1rem;padding-top:3.25rem;max-width:100%}.pt2{font-size:22px}
}
</style>
</head>
<body>

<button class="hamburger" onclick="toggleSB()" aria-label="Menú"><span></span><span></span><span></span></button>
<div class="ovl" id="ovl" onclick="toggleSB()"></div>
<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="logo">Pre<span>PAU</span></div>
  <div class="sub">Lengua · 2º Bach · 24/25</div>
  <div class="stat-row">
    <div class="stat"><span class="num" id="s-done">0</span><span class="lbl">Hechos</span></div>
    <div class="stat"><span class="num" id="s-ok">0</span><span class="lbl">Correctos</span></div>
  </div>
  <div class="pw">
    <div class="pl"><span>Progreso</span><span id="s-pct">0%</span></div>
    <div class="pt"><div class="pf" id="s-bar" style="width:0%"></div></div>
  </div>
  <div id="nav-c"></div>
  <div class="sf">
  Corrección IA · PrePAU Proa Escola 24/25
  <button onclick="resetAllProgress()" style="display:block;margin-top:.6rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.45);border-radius:6px;padding:4px 10px;font-size:10px;font-family:inherit;cursor:pointer;width:100%;text-align:left;">↺ Borrar progreso</button>
</div>
</aside>
<main class="main" id="main">
  <div id="ph" class="ph"></div>
  <div id="ea"></div>
</main>
</div>
<script>
const BLOCKS=[
  {id:0,title:"Expresión escrita",     desc:"Registro, argumentación, corrección, estilo indirecto, puntuación, conectores y transformaciones."},
  {id:1,title:"Pares mínimos",         desc:"Explica la diferencia gramatical entre cada par de oraciones."},
  {id:2,title:"Análisis inverso",      desc:"Construye una oración con exactamente los elementos indicados y justifica cada uno."},
  {id:3,title:"Funciones sintácticas", desc:"Identifica la función de cada sintagma, analiza pronombres y relaciona funciones."},
  {id:4,title:"Oraciones compuestas",  desc:"Tipos de subordinadas, modalidad oracional, comparación de estructuras y unión de oraciones."},
  {id:5,title:"Léxico",                desc:"Vocabulario: sinónimos, parónimos y registro formal."},
  {id:6,title:"Morfología",            desc:"Jerarquías de formación, análisis morfológico, verdadero/falso y clasificación de procesos."},
];

// ══════════════════════════════════════════════════════
// EJERCICIOS
// type: "open" | "mcq" | "sent-mcq" | "fill" | "paronyms" | "join"
// Expresión escrita: campo `modelSolution` (null = pendiente)
// ══════════════════════════════════════════════════════
const EX=[

// ── BLOQUE 0: Expresión escrita ───────────────────────────────────────────
{block:0,type:"open",meta:"Registro · 1a",
prompt:"Transforma este mensaje de chat en un correo formal dirigido a la universidad.",
quote:"«Oye, quería saber si me podéis decir lo de la matrícula porque no me entero.»",
placeholder:"Estimados señores/as,\n\nMe dirijo a ustedes para...",
rubric:"Saludo formal, ausencia de tuteo, vocabulario elevado (matrícula, proceso de inscripción), cierre formal. Penaliza 'no me entero', 'lo de'.",
modelSolution: null},

{block:0,type:"open",meta:"Registro · 1c",
prompt:"Transforma este mensaje en una carta formal para solicitar unas prácticas.",
quote:"«Hola, quiero hacer unas prácticas con vosotros porque me mola bastante vuestro rollo.»",
placeholder:"Estimado/a responsable de RRHH:\n\nMe pongo en contacto con ustedes para...",
rubric:"Eliminar 'mola' y 'rollo', usar 'solicitar / interés profesional / su empresa', motivación formal, despedida protocolaria.",
modelSolution: null},

{block:0,type:"open",meta:"Argumentación · 14",
prompt:"Convierte el texto expositivo en argumentativo con tesis explícita sobre el cambio climático.",
quote:"«El cambio climático es un fenómeno global que se refiere al aumento progresivo de la temperatura media del planeta...»",
placeholder:"Tesis: El cambio climático exige una respuesta urgente e individual.\n\nEn primer lugar...",
rubric:"Tesis clara al inicio, ≥2 argumentos con conectores, contraargumento refutado, conclusión que retoma la tesis.",
modelSolution: null},

{block:0,type:"open",meta:"Argumentación · 15",
prompt:"Convierte el texto expositivo sobre humanidades en argumentativo con posición explícita.",
quote:"«Los estudios humanísticos son aquellos que se centran en el análisis de la cultura, el pensamiento y la expresión humana...»",
placeholder:"Los estudios humanísticos son indispensables en la formación contemporánea...",
rubric:"Tesis explícita, argumentos con ejemplos (capacidad crítica, comunicación), contraargumento rebatido, conclusión con llamada a la acción.",
modelSolution: null},

{block:0,type:"open",meta:"Registro · 28",
prompt:"Reescribe con registro y léxico adecuados para un artículo de opinión en un periódico.",
quote:"«La gente compra un montón de cosas sin pensar y luego se queda sin dinero, lo cual es un lío bastante grande.»",
placeholder:"El consumismo irreflexivo conduce a...",
rubric:"'montón de cosas'→bienes, 'sin pensar'→de forma impulsiva, 'se queda sin dinero'→compromete su estabilidad económica, 'lío'→problema grave.",
modelSolution: null},

// ── BLOQUE 1: Corrección gramatical ──────────────────────────────────────
{block:0,type:"open",meta:"Corrección · 3",
prompt:"Detecta dos errores y explica la norma gramatical que los corrige.",
quote:"«El alumnado entregaron el trabajo bastante tarde, a pesar de que habían tenido tiempo suficiente para prepararlo durante la semana.»",
placeholder:"Error 1: ...\nNorma: ...\n\nError 2: ...\nNorma: ...",
rubric:"Error 1: 'entregaron'→'entregó'. 'Alumnado' colectivo singular. Error 2: 'habían tenido'→'había tenido'. Concordancia con núcleo colectivo."},

{block:0,type:"open",meta:"Corrección · 5",
prompt:"Detecta dos errores y explica la norma que los corrige.",
quote:"«La pidieron que mantuviera discreción, porque podían haber muchas personas que no supieran el resultado.»",
placeholder:"Error 1: ...\nNorma: ...\n\nError 2: ...\nNorma: ...",
rubric:"Error 1: 'La pidieron'→'Le pidieron'. 'Pedir' rige CI; 'la' es laísmo. Error 2: 'podían haber'→'podía haber'. 'Haber' existencial impersonal va en singular."},

{block:0,type:"open",meta:"Corrección · 6",
prompt:"Detecta dos errores y explica la norma que los corrige.",
quote:"«Es una amiga que su madre, que era profe durante muchos años en el instituto del barrio, le tradució todas las páginas del texto en latín sin dificultad.»",
placeholder:"Error 1: ...\nNorma: ...\n\nError 2: ...\nNorma: ...",
rubric:"Error 1: 'tradució'→'tradujo'. Verbo irregular. Error 2: 'que su madre'→'cuya madre'. Relativo posesivo 'cuyo/a'."},

{block:0,type:"open",meta:"Corrección · 7",
prompt:"Detecta dos errores y explica la norma que los corrige.",
quote:"«Nos dijistes que no nos sentásemos detrás tuyo porque no se veía bien la pizarra desde ese lado del aula.»",
placeholder:"Error 1: ...\nNorma: ...\n\nError 2: ...\nNorma: ...",
rubric:"Error 1: 'dijistes'→'dijiste'. Pret. indef. 2ª sg. sin -s. Error 2: 'detrás tuyo'→'detrás de ti'. Adverbios de lugar rigen 'de' + pronombre tónico."},

// ── BLOQUE 2: Conectores ──────────────────────────────────────────────────
{block:0,type:"fill",meta:"Conectores · 8",
prompt:"Elige el conector más adecuado para cada oración.",

// ── BLOQUE 3: Reflexión lingüística (TIPO TEST — oraciones como opciones) ─

// 3.1 Modalidad oracional
{block:0,type:"sent-mcq",meta:"Modalidad · Interrogativa total",
prompt:"¿Cuál de estas oraciones es una interrogativa directa total?",
options:[
  {text:"¿Cuándo llegaste?",          correct:false, expl:"Interrogativa parcial: contiene pronombre interrogativo «cuándo»."},
  {text:"¿Llegaste ayer?",            correct:true,  expl:"Interrogativa total: no hay pronombre interrogativo, la respuesta es sí/no."},
  {text:"¡Qué tarde llegaste!",       correct:false, expl:"Exclamativa, introducida por «qué» exclamativo."},
  {text:"Quizás llegaras ayer.",      correct:false, expl:"Dubitativa con adverbio modal «quizás» + subjuntivo."},
],
explanation:"Las interrogativas totales no tienen pronombre interrogativo y admiten respuesta sí/no. Las parciales preguntan por un elemento concreto (cuándo, quién, cómo...)."},

{block:0,type:"sent-mcq",meta:"Modalidad · Exclamativa",
prompt:"¿Cuál de estas oraciones es exclamativa?",
options:[
  {text:"¿Qué calor hace?",           correct:false, expl:"Interrogativa parcial con «qué» interrogativo."},
  {text:"Hace mucho calor.",          correct:false, expl:"Enunciativa afirmativa."},
  {text:"¡Qué calor tengo!",          correct:true,  expl:"Exclamativa: marcada por entonación exclamativa y «qué» exclamativo + sustantivo."},
  {text:"Ojалá haga calor.",          correct:false, expl:"Desiderativa con «ojalá» + subjuntivo."},
],
explanation:"Las exclamativas se caracterizan por entonación exclamativa y frecuentemente por «qué/cuánto/cómo» en función exclamativa, no interrogativa."},

{block:0,type:"sent-mcq",meta:"Modalidad · Impersonal con se",
prompt:"¿Cuál de estas oraciones contiene un «se» impersonal (sin sujeto gramatical)?",
options:[
  {text:"Se vendieron todos los libros.",   correct:false, expl:"Pasiva refleja: «todos los libros» es sujeto paciente con el que concuerda el verbo."},
  {text:"Se está muy bien aquí.",           correct:true,  expl:"Impersonal con «se»: el verbo no concuerda con ningún SN; no hay sujeto gramatical."},
  {text:"Se construyeron dos edificios.",   correct:false, expl:"Pasiva refleja: «dos edificios» es sujeto paciente."},
  {text:"Se compró el piso.",               correct:false, expl:"Pasiva refleja o reflexiva; «el piso» puede funcionar como sujeto."},
],
explanation:"En las impersonales con «se», el verbo no tiene sujeto y va siempre en 3ª persona del singular. Las pasivas reflejas tienen un SN sujeto con el que concuerda el verbo."},

{block:0,type:"sent-mcq",meta:"Modalidad · Dubitativa",
prompt:"¿Cuál de estas oraciones es dubitativa?",
options:[
  {text:"No sé si vendrá mañana.",    correct:false, expl:"Interrogativa indirecta subordinada, no principal."},
  {text:"Tal vez venga mañana.",      correct:true,  expl:"Dubitativa: adverbio modal «tal vez» + subjuntivo expresa probabilidad o duda."},
  {text:"Vendrá mañana seguro.",      correct:false, expl:"Enunciativa afirmativa con adverbio de certeza."},
  {text:"¿Vendrá mañana?",           correct:false, expl:"Interrogativa directa total."},
],
explanation:"Las oraciones dubitativas expresan duda o probabilidad mediante adverbios modales (quizás, tal vez, acaso, igual) que rigen indicativo (mayor certeza) o subjuntivo (menor certeza)."},

// 3.2 Par mínimo — gramática (tipo test)
{block:0,type:"sent-mcq",meta:"Par mínimo · Relativa",
prompt:"¿Cuál de estas oraciones es gramatical y por qué?",
options:[
  {text:"Es una persona que la vi ayer.",    correct:false, expl:"Agramatical: duplicación del CD. «que» ya es CD; añadir «la» es redundante."},
  {text:"Es una persona a la que vi ayer.",  correct:true,  expl:"Gramatical: el relativo «a la que» ejerce de CD con su preposición; no hay duplicación."},
  {text:"Es una persona que le vi ayer.",    correct:false, expl:"Agramatical: leísmo de persona (uso incorrecto del CI «le» por CD)."},
  {text:"Es una persona que la vi a ella.",  correct:false, expl:"Agramatical: duplicación con pronombre tónico, no aceptable en relativa especificativa."},
],
explanation:"En relativas especificativas, el pronombre relativo debe llevar la preposición que le corresponde a su función («a la que» = CD). No se añade pronombre de retoma."},

{block:0,type:"sent-mcq",meta:"Par mínimo · Inacusativo vs. transitivo",
prompt:"¿Cuál de estas oraciones es gramatical?",
options:[
  {text:"*El árbol fue florecido.",      correct:false, expl:"Agramatical: «florecer» es inacusativo, no tiene agente; no admite pasiva perifrástica."},
  {text:"El árbol fue talado.",          correct:true,  expl:"Gramatical: «talar» es transitivo (hay agente implícito); admite pasiva perifrástica."},
  {text:"*El árbol fue aparecido.",      correct:false, expl:"Agramatical: «aparecer» es inacusativo; misma razón que «florecer»."},
  {text:"*El árbol fue crecido por él.", correct:false, expl:"Agramatical: «crecer» es inacusativo; no admite pasiva perifrástica."},
],
explanation:"Solo los verbos transitivos (con argumento externo/agente) admiten pasiva perifrástica con «ser + participio». Los verbos inacusativos solo tienen argumento interno y no pueden tener agente."},

{block:0,type:"sent-mcq",meta:"Par mínimo · Colectivo singular",
prompt:"¿Cuál de estas oraciones es gramatical?",
options:[
  {text:"*El equipo llegaron tarde.",   correct:false, expl:"Agramatical: «equipo» es sustantivo colectivo singular; el verbo debe ir en singular."},
  {text:"El equipo llegó tarde.",       correct:true,  expl:"Gramatical: verbo en singular concordando con el núcleo colectivo «equipo»."},
  {text:"*La gente deciden solos.",     correct:false, expl:"Agramatical: «gente» es colectivo singular → «decide» (singular); «solos» tampoco concuerda."},
  {text:"*El alumnado entregaron.",     correct:false, expl:"Agramatical: «alumnado» es colectivo singular → «entregó»."},
],
explanation:"Los sustantivos colectivos (equipo, alumnado, gente, grupo...) son morfológicamente singulares en español y rigen concordancia verbal en singular, a diferencia de algunas otras lenguas."},

// 3.3 Funciones sintácticas — identificar la correcta
{block:0,type:"sent-mcq",meta:"Función sintáctica · CC de instrumento",
prompt:"¿En cuál de estas oraciones el sintagma en mayúsculas es un CC de instrumento?",
options:[
  {text:"Los alumnos realizan los ejercicios EN CASA.",   correct:false, expl:"CC de lugar (indica dónde se realiza la acción)."},
  {text:"Marcos corta el pan CON EL CUCHILLO.",          correct:true,  expl:"CC de instrumento (objeto físico usado para realizar la acción)."},
  {text:"Carla llegó CON GRIPE.",                        correct:false, expl:"CC de modo o complemento de manera (estado en que llega)."},
  {text:"Salió CON SUS AMIGOS.",                         correct:false, expl:"CC de compañía (acompañante de la acción)."},
],
explanation:"El CC de instrumento indica el objeto físico con el que se realiza la acción. Se construye con «con» + SN concreto manipulable por el agente."},

{block:0,type:"sent-mcq",meta:"Función sintáctica · Sujeto oracional",
prompt:"¿En cuál de estas oraciones el sujeto es una oración subordinada sustantiva?",
options:[
  {text:"Le gusta QUE LA LLAMES.",             correct:true,  expl:"«Que la llames» es sujeto: el verbo «gustar» selecciona sujeto, no CD."},
  {text:"Sonia no explicó QUÉ FUMA.",          correct:false, expl:"«Qué fuma» es CD (interrogativa indirecta)."},
  {text:"Me alegra LA NOTICIA.",               correct:false, expl:"«La noticia» es SN, no oración subordinada."},
  {text:"No entiendo LO QUE DICES.",          correct:false, expl:"«Lo que dices» es CD (relativa libre/sustantivada)."},
],
explanation:"«Gustar», «encantar», «molestar»... seleccionan un sujeto oracional. La prueba: si puedes sustituirlo por «eso» y el verbo no cambia de función, es sujeto."},

{block:0,type:"sent-mcq",meta:"Función sintáctica · Complemento predicativo",
prompt:"¿En cuál de estas oraciones el adjetivo en mayúsculas es un complemento predicativo?",
options:[
  {text:"Tuvimos que comprar los muebles CAROS.",        correct:false, expl:"Aquí «caros» es modificador del SN «los muebles caros» → CN adjetivo."},
  {text:"Tuvimos que comprar CAROS los muebles.",        correct:true,  expl:"«Caros» predicativo del CD «los muebles»: describe el estado del objeto en el momento de la compra."},
  {text:"Los muebles son CAROS.",                        correct:false, expl:"«Caros» es atributo del sujeto en oración copulativa."},
  {text:"Son unos muebles muy CAROS.",                   correct:false, expl:"«Caros» es CN adjetivo del SN «unos muebles muy caros»."},
],
explanation:"El complemento predicativo modifica a la vez al verbo y a un SN (sujeto o CD). A diferencia del CN adjetivo, no está integrado dentro del SN y aparece en posición dislocada."},

// Funciones sintácticas — tipo test (11 preguntas del PDF)
{block:4,type:"sent-mcq",meta:"Función sint. · 1 — sopa recalentada",
prompt:"¿Cuál es la función sintáctica de «la sopa recalentada» en: «Comieron en un restaurante la sopa recalentada»?",
options:[
  {text:"CD (complemento directo)",correct:true, expl:"«La sopa recalentada» es el objeto directo del verbo comer: responde a «¿qué comieron?»"},
  {text:"CLA (complemento locativo argumental)",correct:false,expl:"El CLA aquí es «en un restaurante», no la sopa."},
  {text:"CN (complemento del nombre)",correct:false,expl:"El CN modifica a un nombre; aquí no depende de ningún SN."},
  {text:"CCL (complemento circunstancial de lugar)",correct:false,expl:"CCL es «en un restaurante». La sopa es el objeto de la acción."},
],
explanation:"«La sopa recalentada» es el CD: responde a «¿qué comieron?» y puede pronominalizarse por «la» (La comieron en un restaurante)."},

{block:4,type:"sent-mcq",meta:"Función sint. · 2 — Me estoy comiendo",
prompt:"¿Qué función tiene «Me» en: «Me estoy comiendo un helado»?",
options:[
  {text:"CD (complemento directo)",correct:false,expl:"El CD es «un helado», no «me»."},
  {text:"CI argumental",correct:false,expl:"No hay CI argumental aquí; el beneficiario de comer es el propio sujeto."},
  {text:"Marca de pasiva refleja",correct:false,expl:"No es pasiva refleja; hay un CD explícito («un helado»)."},
  {text:"Dativo aspectual (dativo de interés propio)",correct:true,expl:"«Me» es un dativo aspectual o de interés: el sujeto realiza la acción en beneficio propio. Añade un matiz de implicación personal."},
],
explanation:"«Me» en «Me estoy comiendo un helado» es un dativo aspectual (de interés propio): no cambia el significado básico pero añade implicación del sujeto en la acción."},

{block:4,type:"sent-mcq",meta:"Función sint. · 3 — Vive en Madrid",
prompt:"¿Cuál es la función de «en Madrid» en: «Vive en Madrid desde hace años»?",
options:[
  {text:"CCL (circunstancial de lugar)",correct:false,expl:"Podría parecerlo, pero «vivir» selecciona obligatoriamente el lugar, así que es argumental."},
  {text:"CLA (complemento locativo argumental)",correct:true,expl:"«Vivir» selecciona el lugar como argumento obligatorio; sin él la oración queda incompleta (*Vive desde hace años)."},
  {text:"CRV (complemento de régimen verbal)",correct:false,expl:"El CRV va introducido por una preposición fija exigida por el verbo semánticamente, como «confiar en» o «depender de»."},
  {text:"Atributo",correct:false,expl:"El atributo aparece con verbos copulativos (ser/estar/parecer), no con «vivir»."},
],
explanation:"«En Madrid» es CLA: el verbo «vivir» exige un locativo como argumento interno. La prueba: *«Vive desde hace años» resulta incompleta sin el lugar."},

{block:4,type:"sent-mcq",meta:"Función sint. · 4 — para su hermana",
prompt:"¿Qué función tiene «para su hermana» en: «Compró un regalo para su hermana»?",
options:[
  {text:"CD (complemento directo)",correct:false,expl:"El CD es «un regalo»."},
  {text:"CI (complemento indirecto)",correct:false,expl:"El CI suele pronominalizarse por «le/les» y requiere verbo de transferencia con destinatario directo."},
  {text:"CC Beneficiario",correct:true,expl:"«Para su hermana» es un adjunto beneficiario: indica para quién se compra, pero no es el destinatario argumental del verbo comprar."},
  {text:"CRV (complemento de régimen verbal)",correct:false,expl:"«Comprar» no selecciona un CRV con «para»."},
],
explanation:"«Para su hermana» es un CC Beneficiario (adjunto): indica el destinatario final del regalo pero no es argumento obligatorio de «comprar» como sí lo sería en «enviar algo a alguien»."},

{block:4,type:"sent-mcq",meta:"Función sint. · 5 — libro de historia",
prompt:"¿Qué función tiene «de historia» en: «El libro de historia es muy interesante»?",
options:[
  {text:"CD",correct:false,expl:"No hay CD en oraciones copulativas."},
  {text:"CN (complemento del nombre)",correct:true,expl:"«De historia» complementa al nombre «libro» dentro del SN sujeto; indica la clase o tipo de libro."},
  {text:"CCL",correct:false,expl:"No indica lugar."},
  {text:"CI",correct:false,expl:"No hay CI en esta oración."},
],
explanation:"«De historia» es CN: depende del nombre «libro» y especifica su tipo. Forma parte del SN «el libro de historia»."},

{block:4,type:"sent-mcq",meta:"Función sint. · 6 — gripazo del trabajo",
prompt:"¿Qué función tiene «con un gripazo del trabajo» en: «Llegó con un gripazo del trabajo»?",
options:[
  {text:"CC instrumento",correct:false,expl:"El instrumento implica un objeto usado para hacer algo; aquí se describe un estado del sujeto."},
  {text:"Predicativo",correct:true,expl:"«Con un gripazo» describe el estado del sujeto («llegó enfermo/con gripe») a la vez que el evento verbal; es predicativo orientado al sujeto."},
  {text:"CCM (circunstancial de modo)",correct:false,expl:"El CCM describe la manera de realizar la acción, no el estado del sujeto."},
  {text:"CCCompañía",correct:false,expl:"La compañía implica que llegó acompañado de alguien, no de una enfermedad."},
],
explanation:"«Con un gripazo» es un predicativo orientado al sujeto: predica simultáneamente del sujeto y del verbo. Indica el estado en que llegó, como «llegó enfermo»."},

{block:4,type:"sent-mcq",meta:"Función sint. · 7 — reparado por el mecánico",
prompt:"¿Qué función tiene «por el mecánico» en: «El coche fue reparado por el mecánico»?",
options:[
  {text:"CRV",correct:false,expl:"El CRV es un complemento de régimen exigido semánticamente por el verbo, no el agente de una pasiva."},
  {text:"Complemento agente",correct:true,expl:"En la pasiva perifrástica, el agente que realiza la acción se expresa con «por + SN». Aquí «el mecánico» es quien repara."},
  {text:"Sujeto",correct:false,expl:"El sujeto es «el coche» (sujeto paciente en la pasiva)."},
  {text:"CD",correct:false,expl:"En la pasiva, el CD de la activa pasa a ser sujeto; no hay CD en esta oración."},
],
explanation:"«Por el mecánico» es el complemento agente de la pasiva perifrástica. En la versión activa sería el sujeto: «El mecánico reparó el coche»."},

{block:4,type:"sent-mcq",meta:"Función sint. · 8 — que me lo recomendó",
prompt:"¿Qué función tiene «que me lo recomendó» en: «La persona que me lo recomendó es alemana»?",
options:[
  {text:"Sujeto",correct:false,expl:"El sujeto es «La persona que me lo recomendó» como conjunto, no solo la subordinada."},
  {text:"CD",correct:false,expl:"No es un complemento directo; la oración principal es copulativa."},
  {text:"Atributo",correct:false,expl:"El atributo es «alemana»."},
  {text:"Complemento del nombre (CN) / subordinada relativa especificativa",correct:true,expl:"«Que me lo recomendó» es una subordinada relativa especificativa que complementa al nombre «persona», funcionando como CN dentro del SN sujeto."},
],
explanation:"«Que me lo recomendó» es una relativa especificativa, función CN dentro del SN «La persona que me lo recomendó». Especifica de qué persona se habla."},

{block:4,type:"sent-mcq",meta:"Función sint. · 9 — con quién estás hablando",
prompt:"¿Qué función tiene «con quién estás hablando» en: «No sabes con quién estás hablando»?",
options:[
  {text:"CCCompañía",correct:false,expl:"No es adjunto circunstancial; es un argumento del verbo saber."},
  {text:"CD (subordinada sustantiva interrogativa indirecta)",correct:true,expl:"«Con quién estás hablando» es una subordinada sustantiva interrogativa indirecta que funciona como CD del verbo «saber»."},
  {text:"CRV",correct:false,expl:"«Saber» no selecciona CRV con preposición fija."},
  {text:"Atributo",correct:false,expl:"No hay verbo copulativo."},
],
explanation:"«Con quién estás hablando» es CD de «saber»: es una subordinada sustantiva interrogativa indirecta. Pronominalizamos: «No lo sabes» → CD confirmado."},

{block:4,type:"sent-mcq",meta:"Función sint. · 10 — que pienses eso",
prompt:"¿Qué función tiene «que pienses eso» en: «Me asusta que pienses eso»?",
options:[
  {text:"CCCompañía",correct:false,expl:"No es adjunto circunstancial."},
  {text:"CD",correct:false,expl:"«Asustar» con sujeto oracional no toma CD sino sujeto."},
  {text:"Sujeto",correct:true,expl:"«Que pienses eso» es el sujeto de «asustar»: es lo que provoca el susto. Prueba: *«Eso me asusta» → sujeto. Verbo no concuerda con «me»."},
  {text:"CRV",correct:false,expl:"«Asustar» no selecciona CRV."},
],
explanation:"«Que pienses eso» es sujeto de «asustar»: los verbos psicológicos (asustar, gustar, molestar…) toman un sujeto que expresa la causa del estado psicológico."},

{block:4,type:"sent-mcq",meta:"Función sint. · 11 — Te oí llorar",
prompt:"¿Qué función tiene «llorar» en: «Te oí llorar en la habitación»?",
options:[
  {text:"CD",correct:false,expl:"«Te» ya es el CD; «llorar» no puede serlo también."},
  {text:"Sujeto",correct:false,expl:"El sujeto es el hablante (tácito)."},
  {text:"Predicativo",correct:true,expl:"«Llorar» es el predicativo del CD «te»: forma parte de la percepción (oír [a alguien] [hacer algo]). Es una construcción de verbos de percepción + infinitivo predicativo."},
  {text:"CCM",correct:false,expl:"No indica modo, sino el estado/acción del CD percibido."},
],
explanation:"En construcciones de percepción (ver, oír, sentir + CD + infinitivo), el infinitivo es predicativo del CD: «te oí [a ti] [llorar]». Describe lo que hace el complemento directo."},

// Tipos de subordinadas — 14 preguntas MCQ
{block:1,type:"sent-mcq",meta:"Subordinadas · 1 — que hayas venido",
prompt:"«Me alegra que hayas venido.» ¿Qué tipo de subordinada es «que hayas venido»?",
options:[
  {text:"Subordinada relativa libre",correct:false,expl:"Las relativas libres no tienen antecedente y funcionan como SN (lo que, quien...)."},
  {text:"Subordinada sustantiva de sujeto",correct:true,expl:"«Alegrar» es verbo psicológico que selecciona sujeto: «que hayas venido» es lo que alegra → sujeto."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa; expresa el argumento sujeto del verbo psicológico."},
  {text:"Subordinada sustantiva de CD",correct:false,expl:"Los verbos psicológicos del tipo «alegrar» seleccionan sujeto oracional, no CD."},
],
explanation:"«Que hayas venido» es subordinada sustantiva de sujeto. Los verbos psicológicos como «alegrar, molestar, gustar» seleccionan un sujeto (la causa del estado) que puede ser oracional."},

{block:1,type:"sent-mcq",meta:"Subordinadas · 2 — que compré ayer",
prompt:"«El libro que compré ayer es muy interesante.» ¿Qué tipo de subordinada es «que compré ayer»?",
options:[
  {text:"Subordinada sustantiva",correct:false,expl:"No cumple función de SN; es modificadora del nombre «libro»."},
  {text:"Subordinada adverbial",correct:false,expl:"No expresa relación adverbial (tiempo, modo, causa…)."},
  {text:"Subordinada relativa especificativa",correct:true,expl:"Modifica al nombre «libro» sin comas, restringiendo el referente (de todos los libros, el que compré ayer)."},
  {text:"Subordinada relativa explicativa",correct:false,expl:"La explicativa va entre comas y no restringe el referente; aquí no hay comas."},
],
explanation:"«Que compré ayer» es relativa especificativa: modifica al nombre «libro» sin comas, identificando cuál de entre todos los libros posibles."},

{block:1,type:"sent-mcq",meta:"Subordinadas · 3 — porque estaba cansado",
prompt:"«No salí porque estaba cansado.» ¿Qué tipo de subordinada es «porque estaba cansado»?",
options:[
  {text:"Subordinada relativa semilibre",correct:false,expl:"Las semilibres tienen antecedente implícito y funcionan como SN."},
  {text:"Subordinada sustantiva término de preposición",correct:false,expl:"No funciona como SN sino como adjunto causal."},
  {text:"Subordinada adverbial consecutiva",correct:false,expl:"La consecutiva expresa efecto de una causa («tan X que Y»)."},
  {text:"Subordinada adverbial causal",correct:true,expl:"«Porque estaba cansado» expresa la causa de no salir. Nexo causal: «porque»."},
],
explanation:"«Porque estaba cansado» es subordinada adverbial causal: introduce la razón o motivo de la acción principal mediante el nexo «porque»."},

{block:1,type:"sent-mcq",meta:"Subordinadas · 4 — cuando llegue a casa",
prompt:"«Te llamaré cuando llegue a casa.» ¿Qué tipo de subordinada es «cuando llegue a casa»?",
options:[
  {text:"Subordinada sustantiva",correct:false,expl:"No funciona como SN."},
  {text:"Subordinada relativa libre",correct:false,expl:"No hay pronombre relativo con antecedente implícito."},
  {text:"Subordinada adverbial temporal",correct:true,expl:"«Cuando llegue a casa» expresa el momento en que ocurrirá la acción principal. Nexo temporal: «cuando»."},
  {text:"Subordinada adverbial concesiva",correct:false,expl:"La concesiva expresa un obstáculo que no impide la acción (aunque, a pesar de que…)."},
],
explanation:"«Cuando llegue a casa» es subordinada adverbial temporal: indica el momento en que se producirá la acción. El subjuntivo («llegue») se usa porque el evento es futuro."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 5 — para que aprueben",
prompt:"«Trabaja mucho para que aprueben el examen.» ¿Qué tipo de subordinada es «para que aprueben el examen»?",
options:[
  {text:"Subordinada adverbial final",correct:true,expl:"Expresa la finalidad o propósito de trabajar mucho. Nexo final: «para que» + subjuntivo."},
  {text:"Subordinada relativa especificativa",correct:false,expl:"No modifica ningún nombre."},
  {text:"Subordinada sustantiva término de preposición",correct:false,expl:"Aunque lleva «para», la relación es de finalidad adverbial, no sustantiva."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa sino finalidad (propósito)."},
],
explanation:"«Para que aprueben» es subordinada adverbial final: expresa el propósito de la acción principal. Las finales llevan «para que / con el fin de que» + subjuntivo."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 6 — si vendrá mañana",
prompt:"«No sé si vendrá mañana.» ¿Qué tipo de subordinada es «si vendrá mañana»?",
options:[
  {text:"Subordinada sustantiva parcial",correct:false,expl:"Las parciales van introducidas por pronombre/adverbio interrogativo (qué, cuándo, cómo…)."},
  {text:"Subordinada sustantiva interrogativa indirecta total",correct:true,expl:"«Si vendrá» es interrogativa indirecta total (sí/no), CD de «saber». «Si» introduce la pregunta total indirecta."},
  {text:"Subordinada adverbial condicional",correct:false,expl:"En las condicionales «si» introduce una condición; aquí introduce una pregunta encubierta."},
  {text:"Subordinada adverbial temporal",correct:false,expl:"No expresa tiempo."},
],
explanation:"«Si vendrá mañana» es subordinada sustantiva interrogativa indirecta total: funciona como CD de «saber» y equivale a la pregunta directa «¿Vendrá mañana?»."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 7 — que digas eso",
prompt:"«Me molesta que digas eso delante de todos.» ¿Qué tipo es «que digas eso»?",
options:[
  {text:"Subordinada sustantiva de CD",correct:false,expl:"«Molestar» es verbo psicológico que selecciona sujeto, no CD."},
  {text:"Subordinada sustantiva de sujeto",correct:true,expl:"«Que digas eso» es la causa del malestar → sujeto de «molestar»."},
  {text:"Subordinada relativa",correct:false,expl:"No hay antecedente nominal que modificar."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa sino el sujeto oracional del verbo psicológico."},
],
explanation:"«Que digas eso» es subordinada sustantiva de sujeto: los verbos psicológicos como «molestar» toman como sujeto aquello que provoca el estado emocional."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 8 — dónde dejé las llaves",
prompt:"«No recuerdo dónde dejé las llaves.» ¿Qué tipo es «dónde dejé las llaves»?",
options:[
  {text:"Subordinada adverbial de lugar",correct:false,expl:"No es adjunto adverbial de la oración principal; es argumento del verbo recordar."},
  {text:"Subordinada sustantiva interrogativa indirecta de CD",correct:true,expl:"Funciona como CD de «recordar» e introduce una pregunta parcial encubierta (¿dónde dejé las llaves?)."},
  {text:"Subordinada relativa libre",correct:false,expl:"Las relativas libres equivalen a «el lugar donde», no a una pregunta indirecta."},
  {text:"Subordinada sustantiva interrogativa de CI",correct:false,expl:"No es CI; «recordar» selecciona CD, no CI."},
],
explanation:"«Dónde dejé las llaves» es subordinada sustantiva interrogativa indirecta parcial con función de CD: equivale a «¿Dónde dejé las llaves?» y es el objeto del verbo recordar."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 9 — Los que llegaron tarde",
prompt:"«Los que llegaron tarde no entraron.» ¿Qué tipo es «los que llegaron tarde»?",
options:[

  {text:"Subordinada relativa semilibre con función de sujeto",correct:true,expl:"«Los que llegaron tarde» = artículo + relativa; el artículo actúa como núcleo nominal implícito. Es una relativa semilibre (o con antecedente incorporado)."},
  {text:"Subordinada sustantiva con función de sujeto",correct:false,expl:"No está introducida por conjunción «que» completiva."},
  {text:"Subordinada adverbial temporal",correct:false,expl:"No expresa tiempo como adjunto; es sujeto de la oración."},
],
explanation:"«Los que llegaron tarde» es una relativa semilibre: el artículo «los» funciona como núcleo nominal (= «las personas que llegaron tarde»). El conjunto ejerce de sujeto."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 11 — de que nadie lo escucha",

{block:1,type:"sent-mcq",meta:"Subordinadas · 12 — aunque esté cansado",

{block:1,type:"sent-mcq",meta:"Subordinadas · 13 — por la que no vino",

// Pares mínimos avanzados
{block:1,type:"sent-mcq",meta:"Par mínimo · «hacer» vs. «estornudar»",
prompt:"¿Por qué es agramatical «*Juan hizo» pero gramatical «Juan estornudó»?",
options:[
  {text:"Porque «hacer» es transitivo y exige CD; «estornudar» es inergativo y solo selecciona sujeto.",correct:true,expl:"Correcto. «Hacer» requiere un objeto directo sin el que no puede usarse (*Juan hizo). «Estornudar» es inergativo: solo necesita sujeto agente."},
  {text:"Porque «hacer» y «estornudar» son verbos ditransitivos.",correct:false,expl:"Ninguno de los dos es ditransitivo."},
  {text:"Porque «hacer» puede omitir el CD en uso absoluto.",correct:false,expl:"«Hacer» NO puede omitir el CD en uso absoluto; es subcategorización obligatoria."},
  {text:"Porque «hacer» necesita siempre un complemento circunstancial.",correct:false,expl:"«Hacer» no exige CC sino CD."},
],
explanation:"«Hacer» es transitivo estricto: su CD es argumento obligatorio. Sin él la oración es agramatical. «Estornudar» es inergativo: el sujeto agente es el único argumento; no selecciona CD."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «óptima» vs. «buena»",
prompt:"¿Por qué «*Es una situación muy óptima» es agramatical pero «Es una situación muy buena» es gramatical?",
options:[
  {text:"Las dos son gramaticales, pero una indica grado mayor.",correct:false,expl:"No; «muy óptima» es agramatical por razones morfológicas."},
  {text:"«Buena» es agramatical porque la expresión correcta es «mejor».",correct:false,expl:"«Buena» es perfectamente gramatical con grado positivo."},
  {text:"«Óptima» es superlativo absoluto y no admite adverbios de grado como «muy».",correct:true,expl:"«Óptimo» ya es superlativo absoluto (≈ «muy bueno»); añadir «muy» genera redundancia morfológica agramatical."},
  {text:"La palabra «óptima» no existe.",correct:false,expl:"«Óptima» existe y es gramatical; el problema es su combinación con «muy»."},
],
explanation:"«Óptimo/a» es superlativo absoluto sintético (del latín *optimus*): ya contiene el significado de 'el mejor / muy bueno'. Añadir «muy» produce una doble gradación agramatical."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «Esos» vs. «Numerosos»",
prompt:"¿Por qué «*Numerosos entraron en casa» es agramatical pero «Esos entraron en casa» es gramatical?",
options:[
  {text:"La 2 es agramatical porque falta el sujeto.",correct:false,expl:"Ambas tienen sujeto; el problema es la categoría del determinante."},
  {text:"La 1 es agramatical porque falta sujeto.",correct:false,expl:"«Esos» puede funcionar como pronombre demostrativo → sujeto válido."},
  {text:"La 1 es agramatical porque los determinantes con núcleo tácito no pueden ser sujeto.",correct:false,expl:"Los determinantes demostrativos SÍ pueden funcionar como pronombres (sujeto)."},
  {text:"La 2 es agramatical porque los adjetivos determinativos con núcleo tácito no pueden ser sujeto preverbal.",correct:true,expl:"«Numerosos» es adjetivo determinativo que necesita un nombre que modificar; sin núcleo nominal explícito no puede legitimar el sujeto preverbal."},
],
explanation:"«Esos» es determinante demostrativo que puede pronominalizarse (= «esas personas»). «Numerosos» es adjetivo determinativo que necesita un nombre: *«numerosos» solo es agramatical como sujeto preverbal."},

{block:1,type:"sent-mcq",meta:"Par mínimo · predicativo y alcance",
prompt:"¿Cuál es la diferencia entre «María llevaba a su hijo al colegio la mar de tranquilo» y «la mar de tranquila»?",
options:[
  {text:"La oración con «tranquilo» es agramatical porque un niño nunca va tranquilo al colegio.",correct:false,expl:"La gramaticalidad no depende del contenido sino de la concordancia del predicativo."},
  {text:"«Tranquila» es agramatical porque «hijo» es masculino.",correct:false,expl:"«Tranquila» es gramatical; concuerda con el sujeto femenino «María»."},
  {text:"Las dos son gramaticales pero el alcance del predicativo cambia: «tranquilo» se orienta al CD («hijo»); «tranquila» se orienta al sujeto («María»).",correct:true,expl:"«Tranquilo» (masc.) concuerda con «hijo» (CD) → predicativo del CD. «Tranquila» (fem.) concuerda con «María» (sujeto) → predicativo del sujeto."},
  {text:"Las dos son gramaticales y el predicativo afecta al circunstancial.",correct:false,expl:"El predicativo afecta al sujeto o al CD, no al CC."},
],
explanation:"La concordancia del predicativo revela su orientación: «tranquilo» (masc.) se orienta al CD «hijo»; «tranquila» (fem.) se orienta al sujeto «María». Ambas son gramaticales con distinto significado."},

{block:1,type:"sent-mcq",meta:"Morfología · jerarquía — interminable",
prompt:"¿Cuál es la jerarquía correcta de formación de «interminable»?",
options:[
  {text:"término > terminable > interminable",correct:false,expl:"La base verbal es «terminar», no el sustantivo «término»."},
  {text:"terminar > terminable > interminable",correct:true,expl:"terminar [verbo] → terminable [sufijo -ble: 'que puede terminarse'] → interminable [prefijo in-: negación]. Derivación en dos pasos."},
  {text:"terminar > interminar > interminable",correct:false,expl:"*«Interminar» no existe como paso intermedio."},
  {text:"minar > minable > interminable",correct:false,expl:"La base no es «minar» sino «terminar»."},
],
explanation:"«Interminable»: terminar → terminable (sufijo -ble) → interminable (prefijo in-). Primero se añade el sufijo que crea el adjetivo, luego el prefijo negativo."},

{block:1,type:"sent-mcq",meta:"Morfología · jerarquía — desigualdades",

  {text:"igual > iguales > desigualdad > desigualdades",correct:false,expl:"El plural del adjetivo no es un paso en la formación del sustantivo."},

{block:1,type:"sent-mcq",meta:"Morfología · jerarquía — desenamoramiento",

],
explanation:"«Desenamoramiento»: amor → enamorar (parasíntesis: en- + -ar) → desenamorar (des-) → desenamoramiento (-miento). Cuatro etapas con prefijos y sufijos acumulados."},

{block:4,type:"open",meta:"Coherencia · Ejercicio 22",
prompt:"Reescribe el texto para mejorar su coherencia y explica qué cambios has realizado y por qué.",
quote:"«En mi ciudad hay muchos parques donde la gente pasea y hace deporte al aire libre. Los árboles ayudan a mejorar la calidad del aire y a reducir la contaminación. Además, es importante cuidar el medio ambiente para tener una vida más saludable. El otro día fui al cine con mis amigos y vimos una película muy interesante. Los parques también son un buen lugar para descansar y desconectar del ruido de la ciudad. Por eso, cada vez más personas utilizan la bicicleta para moverse.»",

rubric:"Debe: 1) Eliminar la oración del cine (rompe la unidad temática). 2) Unificar el tema (parques/medioambiente). 3) Reorganizar las ideas en orden lógico (beneficios→consecuencias). 4) Explicar cada cambio justificando coherencia temática y progresión de la información."},

{block:4,type:"open",meta:"Coherencia · Ejercicio 23 — ¿por qué mejora?",
prompt:"Explica por qué las correcciones del texto mejorado son más adecuadas para una argumentación PAU.",
quote:"ORIGINAL: «La alimentación es muy importante y hay que comer bien para estar sano. Yo ayer me comí una hamburguesa enorme y estaba brutal. También es bueno hacer deporte y esas cosas. La fruta tiene vitaminas y tal, aunque a veces no apetece mucho. En general hay que cuidarse porque si no luego te encuentras fatal.»\n\nCORREGIDO: «La alimentación equilibrada es fundamental para mantener una buena salud. Consumir alimentos ricos en nutrientes, como frutas y verduras, aporta vitaminas esenciales para el organismo. Además, la práctica regular de ejercicio físico contribuye al bienestar general. De modo que la adopción de hábitos saludables resulta clave para prevenir problemas de salud.»",
placeholder:"Las correcciones mejoran el texto por varias razones:\n1. Registro: se eliminan expresiones coloquiales ('brutal', 'esas cosas', 'tal', 'te encuentras fatal') y se sustituyen por léxico formal...\n2. Coherencia: se suprime la anécdota personal de la hamburguesa porque...\n3. Cohesión: se añaden conectores ('además', 'de modo que') porque...",
rubric:"Debe explicar: 1) Eliminación de registro coloquial y anécdotas personales (inadecuados en argumentación PAU). 2) Uso de léxico preciso y abstracto (alimentación equilibrada, práctica regular). 3) Conectores argumentativos que marcan la progresión lógica. 4) Generalización vs. particularización (yo→el ser humano/las personas)."},

{block:4,type:"open",meta:"Conectores equivalentes · 24",
prompt:"Sustituye los conectores del texto por otros equivalentes manteniendo el significado.",
quote:"«La actividad física es fundamental para la salud, ya que mejora la condición física y reduce el estrés. Además, contribuye al bienestar emocional. Sin embargo, muchas personas no practican ejercicio con regularidad. Por eso, es importante fomentar hábitos saludables desde una edad temprana.»",
placeholder:"La actividad física es fundamental para la salud, [equivalente de 'ya que'] mejora...\n[equivalente de 'Además']...\n[equivalente de 'Sin embargo']...\n[equivalente de 'Por eso']...",
rubric:"'ya que'→puesto que/dado que/porque. 'Además'→asimismo/del mismo modo/igualmente. 'Sin embargo'→no obstante/pero/con todo. 'Por eso'→por lo tanto/en consecuencia/de ahí que. Penalizar cambio de relación lógica."},

{block:4,type:"open",meta:"Tesis, arg. y contraarg. · 27 (teletrabajo)",
prompt:"Identifica la tesis, el argumento y el contraargumento del texto. Después, sustituye los conectores por equivalentes.",
quote:"«El teletrabajo ha mejorado la calidad de vida de muchos empleados, ya que permite conciliar mejor la vida laboral y personal. Sin embargo, algunos opinan que reduce la productividad y dificulta el trabajo en equipo. Aun así, muchas empresas siguen apostando por este modelo. Por ello, es necesario encontrar un equilibrio entre ambas modalidades.»",
placeholder:"Tesis: El teletrabajo ha mejorado la calidad de vida de muchos empleados.\nArgumento: ya que permite conciliar...\nContraargumento: Sin embargo, algunos opinan...\n\nTexto con conectores equivalentes:\n...",
rubric:"Tesis: primera oración (el teletrabajo ha mejorado la calidad de vida). Argumento: cláusula causal ('ya que permite conciliar...'). Contraargumento: 'Sin embargo, algunos opinan...'. Refutación: 'Aun así, muchas empresas...'. Conectores: 'ya que'→puesto que, 'Sin embargo'→no obstante, 'Aun así'→con todo, 'Por ello'→por lo tanto."},

{block:6,type:"sent-mcq",meta:"Modalidad · Me gustaría que apruebes",

{block:6,type:"sent-mcq",meta:"Modalidad · ¿Me puedes acercar la sal?",

options:[

{block:6,type:"sent-mcq",meta:"Modalidad · Se vieron ayer al salir",
prompt:"¿Cómo se clasifica «Se vieron ayer al salir de la clase»?",
options:[

],

{block:6,type:"open",meta:"Comparación · par activa/pasiva",
prompt:"Compara estas dos oraciones y explica qué cambia en su estructura y función informativa.",
quote:"(a) Juan compró el coche.\n(b) El coche fue comprado por Juan.",
placeholder:"Estructura: en (a) 'Juan' es sujeto agente y 'el coche' es CD. En (b) 'el coche' pasa a ser sujeto paciente y 'Juan' se convierte en complemento agente...\nFunción informativa: en (a) el tema (información conocida) es 'Juan' y el rema (información nueva) es 'el coche'. En (b) el tema es 'el coche' y el rema es...",
rubric:"Estructura: activa (sujeto agente + verbo transitivo + CD) → pasiva perifrástica (sujeto paciente + ser + participio + complemento agente). Función informativa (tema/rema): en (a) Juan es tema → se tematiza al agente; en (b) el coche es tema → se tematiza al paciente. La pasiva permite topicalizar el objeto."},

{block:6,type:"open",meta:"Comparación · dislocación (el coche lo compró Juan)",
prompt:"Compara estas dos oraciones y explica qué cambia en su estructura y función informativa.",
quote:"(a) Juan compró el coche.\n(b) El coche lo compró Juan.",
placeholder:"En (a) la estructura es canónica: Juan (sujeto) + compró (verbo) + el coche (CD)...\nEn (b) 'el coche' está dislocado a la izquierda (topicalizado) y retomado por el pronombre 'lo'. Es una construcción de tópico con copia pronominal...",
rubric:"(a) Orden canónico SVO. (b) Dislocación a la izquierda: el CD 'el coche' se convierte en tópico (información dada), retomado por el clítico 'lo'. El foco recae sobre 'Juan' al final. No es pasiva; el sujeto sigue siendo agente. Fenómeno de topicalización para reorganizar la estructura informativa."},

{block:6,type:"open",meta:"Comparación · focalización (De eso es de lo que hablaré)",
prompt:"Compara estas dos oraciones y explica qué cambia en su estructura y función informativa.",
quote:"(a) Hablaré de eso.\n(b) De eso es de lo que hablaré.",
placeholder:"En (a) la estructura es canónica: 'hablaré' (verbo) + 'de eso' (CRV)...\nEn (b) es una oración ecuacional o de relieve: 'De eso' está focalizado mediante la construcción 'ser + de lo que'. Se pone énfasis contrastivo sobre el tema del que se hablará...",
rubric:"(a) Oración simple con CRV 'de eso'. (b) Oración hendida/ecuacional de relieve (cleft sentence): 'de eso ES de lo que hablaré'. Función: focalización contrastiva del CRV. La construcción copulativa de relieve extrae un constituyente y lo convierte en foco. Contraste posible con 'De eso es de lo que hablaré, no de otra cosa'."},

// ── BLOQUE 14: Funciones completas + pronombres + relacionar ──────────────
{block:3,type:"sent-mcq",meta:"Función sint. · La libreta roja / sobre la mesa",
prompt:"¿Qué función tiene «sobre la mesa» en: «La libreta roja está sobre la mesa»?",
options:[
  {text:"CLA (complemento locativo argumental)",correct:true,expl:"'Estar' selecciona un locativo como argumento: *'La libreta roja está' está incompleto sin el lugar."},
  {text:"CCL (circunstancial de lugar)",correct:false,expl:"El CCL es adjunto optativo; aquí el lugar es argumento obligatorio de 'estar'."},
  {text:"Atributo",correct:false,expl:"El atributo caracteriza al sujeto con adjetivos o SN; aquí es un SPrep locativo."},
  {text:"CN (complemento del nombre)",correct:false,expl:"No modifica a ningún nombre; es complemento del verbo."},
],
explanation:"«Sobre la mesa» es CLA: el verbo 'estar' exige un locativo como argumento interno (*«La libreta roja está» resulta incompleto). A diferencia del CCL, no es suprimible sin afectar la gramaticalidad."},

{block:3,type:"sent-mcq",meta:"Función sint. · Ayer llegó con gripe",
prompt:"¿Qué función tiene «con gripe» en: «Ayer llegó mi hermano con gripe»?",
options:[
  {text:"CC de compañía",correct:false,expl:"La compañía implica una persona que acompaña, no una enfermedad."},
  {text:"Predicativo orientado al sujeto",correct:true,expl:"'Con gripe' describe el estado en que llegó el sujeto ('llegó enfermo/con gripe'). Predica simultáneamente del sujeto y del verbo."},
  {text:"CC de instrumento",correct:false,expl:"El instrumento implica un objeto con el que se realiza la acción."},
  {text:"CC de modo",correct:false,expl:"El modo describe cómo se realiza la acción; 'con gripe' describe el estado del sujeto."},
],
explanation:"«Con gripe» es predicativo del sujeto: describe el estado de «mi hermano» en el momento de llegar. Se orienta al sujeto y predica sobre él simultáneamente con el verbo."},

{block:3,type:"sent-mcq",meta:"Función sint. · Andrés vive en su habitación",
prompt:"¿Qué función tiene «en su habitación» en: «Andrés vive en su habitación»?",
options:[
  {text:"CCL",correct:false,expl:"El CCL es adjunto; aquí el lugar es argumento seleccionado por 'vivir'."},
  {text:"CLA",correct:true,expl:"'Vivir' selecciona el locativo como argumento: *'Andrés vive' está incompleto sin especificar dónde."},

],
explanation:"«En su habitación» es CLA: «vivir» exige un locativo como argumento interno. Sin él la oración queda incompleta o indefinida."},

{block:3,type:"sent-mcq",meta:"Función sint. · por la lluvia",
prompt:"¿Qué función tiene «por la lluvia» en: «Se anuló el partido por la lluvia»?",
options:[
  {text:"Complemento agente",correct:false,expl:"El complemento agente aparece en pasivas perifrásticas; aquí 'se' no forma pasiva perifrástica."},

let curB=0,curI=0,answered={},correctCount=0,fillSel={},viewMode='single';

// ── PERSISTENCIA (localStorage) ──────────────────────────
const STORAGE_KEY='prepau_progress_v1';

function saveProgress(){
  try{
    // Save answered, correctCount, fillSel, and per-exercise data
    const exData={};
    EX.forEach((ex,i)=>{
      if(ex._ans||ex._fb||ex._chosenIdx!==undefined||ex._listExpanded){
        exData[i]={
          ans:ex._ans||null,
          fb:ex._fb||null,
          chosenIdx:ex._chosenIdx!==undefined?ex._chosenIdx:null,
          listExpanded:ex._listExpanded||false,
          modelSolution:ex.modelSolution||null,
        };
      }
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify({
      answered,correctCount,fillSel,viewMode,exData
    }));
  }catch(e){}
}

function loadProgress(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data=JSON.parse(raw);
    if(data.answered)   answered=data.answered;
    if(data.correctCount!==undefined) correctCount=data.correctCount;
    if(data.fillSel)    fillSel=data.fillSel;
    if(data.viewMode)   viewMode=data.viewMode;
    if(data.exData){
      Object.entries(data.exData).forEach(([i,d])=>{
        const ex=EX[+i];
        if(!ex) return;
        if(d.ans)            ex._ans=d.ans;
        if(d.fb)             ex._fb=d.fb;
        if(d.chosenIdx!==null) ex._chosenIdx=d.chosenIdx;
        if(d.listExpanded)   ex._listExpanded=d.listExpanded;
      });
    }
  }catch(e){}
}

function resetAllProgress(){
  if(!confirm('¿Seguro que quieres borrar todo tu progreso? Esta acción no se puede deshacer.')) return;
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  answered={};correctCount=0;fillSel={};viewMode='single';
  EX.forEach(ex=>{ ex._ans=null;ex._fb=null;ex._chosenIdx=undefined;ex._listExpanded=false; });
  rHdr();rEx();updStats();saveProgress();
}

function buildNav(){
  const c=document.getElementById('nav-c');c.innerHTML='';
  BLOCKS.forEach((b,i)=>{
    const bt=document.createElement('button');
    bt.className='nb'+(i===0?' active':'');bt.id='tab-'+i;
    bt.innerHTML=`<span class="dot"></span>${b.title}<span class="cnt" id="cnt-${i}">0</span>`;
    bt.onclick=()=>swB(i);
    c.appendChild(bt);
  });
}
function swB(b){
  curB=b;curI=0;fillSel={};
  document.querySelectorAll('.nb').forEach((bt,i)=>bt.classList.toggle('active',i===b));
  rHdr();rEx();
  if(window.innerWidth<=820)toggleSB();
}
function toggleSB(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('ovl').classList.toggle('open');
}
